<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SDStrike — Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { max-width: 600px; margin: 0 auto; }

    .team-header { background: #1a3f7a; padding: 16px; }
    .team-header .team-name { font-size: 20px; font-weight: 900; color: #fff; }
    .team-header .team-meta { font-size: 12px; color: #aac4f5; margin-top: 4px; }
    .team-header .header-row { display: flex; justify-content: space-between; align-items: center; }

    .tab-bar { display: flex; background: #fff; border-bottom: 2px solid #e8e8e8; padding: 0; position: sticky; top: 0; z-index: 9; }
    .tab-btn { flex: 1; padding: 12px 0; text-align: center; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; font-family: inherit; }
    .tab-btn.active { color: #1a3f7a; border-bottom-color: #1a3f7a; }

    .tab-panel { display: none; padding: 0 0 60px; }
    .tab-panel.active { display: block; }

    .widget-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px; }
    .widget { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e5e5e5; }
    .widget .wlabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .widget .wlabel.practice { color: #1a3f7a; }
    .widget .wlabel.game { color: #b7600a; }
    .widget .wdate { font-size: 15px; font-weight: 800; }
    .widget .wdetail { font-size: 11px; color: #888; margin-top: 2px; }
    .widget.empty-widget { color: #bbb; font-size: 12px; display: flex; align-items: center; justify-content: center; text-align: center; min-height: 70px; }

    .section-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; margin: 0 16px 12px; }
    .section-card h2 { font-size: 15px; font-weight: 800; color: #1a3f7a; margin-bottom: 10px; }

    .sched-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .sched-row:last-child { border-bottom: none; }
    .sched-date { font-weight: 700; min-width: 70px; font-size: 12px; }
    .sched-detail { color: #666; font-size: 12px; flex: 1; }
    .ext-tag { font-size: 9px; color: #888; text-transform: uppercase; margin-left: 4px; }

    .msg-item { padding: 12px; background: #f4f6fa; border-radius: 10px; margin-bottom: 8px; }
    .msg-head { display: flex; gap: 8px; align-items: baseline; font-size: 11px; color: #888; margin-bottom: 4px; }
    .msg-author { font-weight: 700; color: #1a3f7a; }
    .msg-body { font-size: 13px; line-height: 1.45; white-space: pre-wrap; }

    .clip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .clip-card { border: 1px solid #e5e5e5; border-radius: 8px; background: #fff; overflow: hidden; cursor: pointer; text-align: left; padding: 0; font-family: inherit; color: inherit; display: flex; flex-direction: column; }
    .clip-card:hover { border-color: #1a3f7a; }
    .clip-thumb { width: 100%; aspect-ratio: 16/9; background: #222 center/cover no-repeat; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; }
    .clip-title { padding: 8px 10px; font-size: 12px; font-weight: 600; }

    .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .roster-item { padding: 8px 10px; background: #f8f8f8; border-radius: 6px; font-size: 13px; }
    .roster-name { font-weight: 600; }
    .roster-email { font-size: 10px; color: #888; margin-top: 1px; }
    .parents-count { margin-top: 10px; font-size: 12px; color: #888; font-style: italic; }

    .coach-tools-bar { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; margin: 12px 16px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .coach-tools-bar h3 { font-size: 13px; font-weight: 800; color: #1a3f7a; }

    .empty { text-align: center; padding: 24px; color: #bbb; font-size: 13px; }

    /* Calendar */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-header h3 { font-size: 14px; font-weight: 800; color: #1a3f7a; }
    .cal-header button { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; color: #1a3f7a; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day-label { text-align: center; font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; padding: 4px 0; }
    .cal-cell { min-height: 64px; background: #fff; border: 1px solid #f0f0f0; border-radius: 4px; padding: 2px; font-size: 10px; position: relative; }
    .cal-cell.other-month { background: #fafafa; color: #ccc; }
    .cal-cell.today { border-color: #1a3f7a; border-width: 2px; }
    .cal-cell .cal-num { font-weight: 700; font-size: 11px; padding: 1px 3px; }
    .cal-event { display: block; padding: 1px 3px; font-size: 9px; font-weight: 700; margin-top: 1px; line-height: 1.3; }
    .cal-event div:first-child { text-transform: uppercase; }
    .cal-event div:not(:first-child) { font-weight: 400; }
    .cal-event.past { opacity: 0.4; text-decoration: line-through; }

    .notif-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c0392b; vertical-align: middle; margin-left: 3px; }
    .notif-dot[hidden] { display: none; }

    .signout-sm { font-size: 11px; color: #fff; font-weight: 700; background: none; border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>

<div class="team-header" data-testid="team-header">
  <div class="header-row">
    <div>
      <div style="font-size:12px;color:#aac4f5;" data-testid="welcome-msg">Welcome</div>
      <div class="team-name" data-testid="team-name">Loading...</div>
      <div class="team-meta" data-testid="team-meta"></div>
    </div>
    <div style="text-align:right;">
      <button class="signout-sm" data-testid="signout">Sign out</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="schedule" data-testid="tab-schedule">Schedule</button>
  <button class="tab-btn" data-tab="feed" data-testid="tab-feed">Messages <span class="notif-dot" data-testid="msg-dot" hidden></span></button>
  <button class="tab-btn" data-tab="roster" data-testid="tab-roster">Roster</button>
</div>

<!-- SCHEDULE TAB -->
<div class="tab-panel active" id="schedulePanel" data-testid="schedule-panel">
  <div class="widget-row" data-testid="widgets">
    <div class="widget" data-testid="widget-practice">
      <div class="wlabel practice">Next Practice</div>
      <div class="wdate" data-testid="wp-date">—</div>
      <div class="wdetail" data-testid="wp-detail"></div>
    </div>
    <div class="widget" data-testid="widget-game">
      <div class="wlabel game">Next Game</div>
      <div class="wdate" data-testid="wg-date">—</div>
      <div class="wdetail" data-testid="wg-detail"></div>
    </div>
  </div>

  <div class="section-card">
    <div class="cal-header">
      <button data-testid="cal-prev">&larr;</button>
      <h3 data-testid="cal-month">April 2026</h3>
      <button data-testid="cal-next">&rarr;</button>
    </div>
    <div class="cal-grid" data-testid="cal-grid">
      <div class="cal-day-label">Sun</div><div class="cal-day-label">Mon</div><div class="cal-day-label">Tue</div><div class="cal-day-label">Wed</div><div class="cal-day-label">Thu</div><div class="cal-day-label">Fri</div><div class="cal-day-label">Sat</div>
    </div>
    <div class="empty" data-testid="schedule-empty" hidden>No upcoming events.</div>
    <div data-testid="schedule-list" hidden></div>
  </div>

  <div class="coach-tools-bar" data-testid="coach-tools" style="display:none;"
    <h3>Coach Tools</h3>
    <a class="btn" data-testid="coach-link" style="font-size:12px;padding:6px 12px;">Open Dashboard</a>
  </div>
</div>

<!-- MESSAGES & CLIPS TAB -->
<div class="tab-panel" id="feedPanel" data-testid="feed-panel">
  <div class="section-card">
    <h2>Coach Messages</h2>
    <div class="empty" data-testid="messages-empty" hidden>No messages yet.</div>
    <div data-testid="messages-list"></div>
  </div>

  <div class="section-card">
    <h2>Game Clips</h2>
    <div class="empty" data-testid="wiki-empty" hidden>No clips yet.</div>
    <div class="clip-grid" data-testid="clip-grid"></div>
  </div>
</div>

<!-- ROSTER TAB -->
<div class="tab-panel" id="rosterPanel" data-testid="roster-panel">
  <div class="section-card">
    <h2>Coaches</h2>
    <div data-testid="roster-coaches"></div>
  </div>
  <div class="section-card">
    <h2>Players</h2>
    <div data-testid="roster-players"></div>
    <div class="parents-count" data-testid="parents-count" hidden></div>
  </div>
  <div data-testid="roster-list" hidden></div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-backdrop" data-testid="clip-modal" hidden role="dialog" aria-modal="true">
  <div class="modal-dialog">
    <button class="modal-close" data-testid="clip-modal-close" aria-label="Close">&times;</button>
    <div class="modal-title" data-testid="clip-modal-title"></div>
    <iframe data-testid="clip-modal-iframe" src="" allow="autoplay"></iframe>
    <div class="modal-commentary" data-testid="clip-modal-commentary"></div>
  </div>
</div>

<script type="module">
import {
  onAuthReady, signOut, getTeam, listMessages, listSchedule, listTeamMembers,
  countTeamParents, listClips, formatDate, formatTime, formatRelative, colorForType,
  drivePreviewUrl, driveThumbnailUrl, parseDriveUrl, renderText,
} from './shared.js';

const params = new URLSearchParams(window.location.search);
const teamId = params.get('id');
const TESTMODE = params.get('testmode') === '1';
const qs = TESTMODE ? '?testmode=1' : '';
const amp = TESTMODE ? '&testmode=1' : '';

let currentUser = null;

// TABS
const msgDot = document.querySelector('[data-testid="msg-dot"]');
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + 'Panel').classList.add('active');
    // Clear dot when Messages tab is opened
    if (btn.dataset.tab === 'feed' && teamId) {
      msgDot.hidden = true;
      try { localStorage.setItem(`msg_seen_${teamId}`, String(Date.now())); } catch {}
    }
  });
});

onAuthReady(async (user) => {
  if (!user) {
    window.location.href = 'signin.html' + qs;
    return;
  }
  currentUser = user;
  const name = user.displayName || user.email || '';
  const membership = (user.teamMemberships || {})[teamId] || '';
  const prefix = membership === 'coach' ? 'Coach ' : 'Welcome, ';
  document.querySelector('[data-testid="welcome-msg"]').textContent = prefix + name;

  if (!teamId) {
    document.body.innerHTML = '<p style="padding:20px">Missing team id.</p>';
    return;
  }
  const memberships = user.teamMemberships || {};
  if (!memberships[teamId] && user.role !== 'admin') {
    document.body.innerHTML = '<p style="padding:20px">You are not a member of this team. <a href="portal.html">Go back</a></p>';
    return;
  }

  const team = await getTeam(teamId);
  if (team) {
    document.querySelector('[data-testid="team-name"]').textContent = team.name || '';
    const metaParts = [team.ageGroup, [team.season, team.year].filter(Boolean).join(' '), team.coachName ? `Coach ${team.coachName}` : ''].filter(Boolean);
    document.querySelector('[data-testid="team-meta"]').textContent = metaParts.join(' \u00b7 ');
    document.title = `SDStrike — ${team.name}`;
  }

  await Promise.all([
    renderSchedule(),
    renderMessages(),
    renderWiki(),
    renderRoster(memberships[teamId]),
  ]);
  showCoachToolsIfCoach(memberships);
  document.body.dataset.ready = '1';
});

// SCHEDULE + CALENDAR
let calYear, calMonth, scheduleData = [];

async function renderSchedule() {
  scheduleData = await listSchedule(teamId);
  const scheduleList = document.querySelector('[data-testid="schedule-list"]');
  const scheduleEmpty = document.querySelector('[data-testid="schedule-empty"]');
  const todayStr = new Date().toISOString().slice(0, 10);

  // Widgets
  const nextPractice = scheduleData.find(e => (e.type || '').toLowerCase().includes('practice') && e.date >= todayStr);
  const nextGame = scheduleData.find(e => (e.type || '').toLowerCase().includes('game') && e.date >= todayStr);
  document.querySelector('[data-testid="wp-date"]').textContent = nextPractice ? formatDate(nextPractice.date) : '—';
  document.querySelector('[data-testid="wp-detail"]').textContent = nextPractice
    ? [formatTime(nextPractice.time), nextPractice.location ? `@ ${nextPractice.location}` : ''].filter(Boolean).join(' ')
    : 'None scheduled';
  document.querySelector('[data-testid="wg-date"]').textContent = nextGame ? formatDate(nextGame.date) : '—';
  document.querySelector('[data-testid="wg-detail"]').textContent = nextGame
    ? [formatTime(nextGame.time), nextGame.opponent ? `vs ${nextGame.opponent}` : ''].filter(Boolean).join(' ')
    : 'None scheduled';

  // Hidden list for test compatibility
  scheduleList.innerHTML = '';
  if (scheduleData.length === 0) { scheduleEmpty.hidden = false; } else { scheduleEmpty.hidden = true; }
  for (const e of scheduleData) {
    const div = document.createElement('div');
    div.dataset.testid = 'schedule-item';
    div.textContent = `${e.type} ${e.date}`;
    if (e.source === 'external') { const s = document.createElement('span'); s.dataset.testid = 'ext-tag'; s.textContent = 'external'; div.appendChild(s); }
    scheduleList.appendChild(div);
  }

  // Calendar
  const now = new Date();
  calYear = calYear || now.getFullYear();
  calMonth = calMonth ?? now.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.querySelector('[data-testid="cal-month"]').textContent = `${monthNames[calMonth]} ${calYear}`;

  const grid = document.querySelector('[data-testid="cal-grid"]');
  // Keep day labels (first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  // Index events by date
  const eventsByDate = {};
  for (const e of scheduleData) {
    (eventsByDate[e.date] ||= []).push(e);
  }

  // Blank cells before first day
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (dateStr === todayStr) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'cal-num';
    num.textContent = d;
    cell.appendChild(num);

    const dayEvents = eventsByDate[dateStr] || [];
    if (dayEvents.length > 0) {
      const firstColor = colorForType(dayEvents[0].type);
      cell.style.background = firstColor.bg;
    }
    for (const e of dayEvents) {
      const color = colorForType(e.type);
      const tag = document.createElement('div');
      tag.className = 'cal-event';
      if (dateStr < todayStr) tag.classList.add('past');
      tag.style.color = color.fg;
      tag.innerHTML = `<div>${escapeHtml(e.type || 'event')}</div>${e.time ? `<div>${escapeHtml(formatTime(e.time))}</div>` : ''}${e.location ? `<div>@ ${escapeHtml(e.location)}</div>` : ''}`;
      cell.appendChild(tag);
    }
    grid.appendChild(cell);
  }
}

document.querySelector('[data-testid="cal-prev"]').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});
document.querySelector('[data-testid="cal-next"]').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

// MESSAGES
async function renderMessages() {
  const msgs = await listMessages(teamId);
  const messagesList = document.querySelector('[data-testid="messages-list"]');
  const messagesEmpty = document.querySelector('[data-testid="messages-empty"]');

  // Check for new messages → show red dot
  if (msgs.length > 0) {
    const newestTime = msgs[0].createdAt || 0;
    let lastSeen = 0;
    try { lastSeen = Number(localStorage.getItem(`msg_seen_${teamId}`)) || 0; } catch {}
    if (newestTime > lastSeen) {
      msgDot.hidden = false;
    }
  }

  messagesList.innerHTML = '';
  if (msgs.length === 0) {
    messagesEmpty.hidden = false;
    return;
  }
  messagesEmpty.hidden = true;
  for (const m of msgs) {
    const div = document.createElement('div');
    div.className = 'msg-item';
    div.dataset.testid = 'message';
    div.dataset.messageId = m.id;
    div.innerHTML = `
      <div class="msg-head">
        <span class="msg-author">${escapeHtml(m.authorName || 'Coach')}</span>
        <span>${escapeHtml(formatRelative(m.createdAt))}</span>
      </div>
      <div class="msg-body">${renderText(m.body)}</div>
    `;
    messagesList.appendChild(div);
  }
}

// WIKI / CLIPS
async function renderWiki() {
  const clips = await listClips(teamId);
  const clipGrid = document.querySelector('[data-testid="clip-grid"]');
  const wikiEmpty = document.querySelector('[data-testid="wiki-empty"]');
  clipGrid.innerHTML = '';
  if (clips.length === 0) {
    wikiEmpty.hidden = false;
    return;
  }
  wikiEmpty.hidden = true;
  for (const c of clips) {
    const fileId = c.driveFileId || parseDriveUrl(c.driveUrl);
    const thumb = c.thumbnailUrl || (fileId ? driveThumbnailUrl(fileId) : '');
    const btn = document.createElement('button');
    btn.className = 'clip-card';
    btn.type = 'button';
    btn.dataset.testid = 'clip-card';
    btn.dataset.clipId = c.id;
    btn.innerHTML = `
      <div class="clip-thumb" style="${thumb ? `background-image:url('${thumb}')` : ''}">${thumb ? '' : '&#9654;'}</div>
      <div class="clip-title">${escapeHtml(c.title || 'Untitled')}</div>
    `;
    btn.addEventListener('click', () => openModal(c, fileId));
    clipGrid.appendChild(btn);
  }
}

// MODAL
const modal = document.querySelector('[data-testid="clip-modal"]');
const modalTitle = document.querySelector('[data-testid="clip-modal-title"]');
const modalIframe = document.querySelector('[data-testid="clip-modal-iframe"]');
const modalCommentary = document.querySelector('[data-testid="clip-modal-commentary"]');

function openModal(clip, fileId) {
  modalTitle.textContent = clip.title || '';
  modalIframe.src = fileId ? drivePreviewUrl(fileId) : '';
  modalCommentary.innerHTML = renderText(clip.commentary || '');
  modal.hidden = false;
}
function closeModal() {
  modal.hidden = true;
  modalIframe.src = '';
}
document.querySelector('[data-testid="clip-modal-close"]').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.hidden) closeModal(); });

// ROSTER
async function renderRoster(myMembership) {
  const members = await listTeamMembers(teamId);
  const coachesEl = document.querySelector('[data-testid="roster-coaches"]');
  const playersEl = document.querySelector('[data-testid="roster-players"]');
  const rosterList = document.querySelector('[data-testid="roster-list"]');
  const parentsCountEl = document.querySelector('[data-testid="parents-count"]');
  const canSeeEmails = myMembership === 'coach' || currentUser.role === 'admin';

  coachesEl.innerHTML = '';
  playersEl.innerHTML = '';
  rosterList.innerHTML = '';

  for (const m of members) {
    const mtype = m.teamMemberships?.[teamId] || '';
    const div = document.createElement('div');
    div.className = 'roster-item';
    div.dataset.testid = 'roster-item';
    div.dataset.uid = m.uid;
    div.innerHTML = `
      <div class="roster-name">${escapeHtml(m.displayName || '')}</div>
      ${canSeeEmails && m.email ? `<div class="roster-email">${escapeHtml(m.email)}</div>` : ''}
    `;
    if (mtype === 'coach') {
      coachesEl.appendChild(div);
    } else {
      playersEl.appendChild(div);
    }
    // Hidden list for test compat
    const clone = div.cloneNode(true);
    rosterList.appendChild(clone);
  }

  if (coachesEl.children.length === 0) coachesEl.innerHTML = '<div class="empty" style="padding:10px;">None</div>';
  if (playersEl.children.length === 0) playersEl.innerHTML = '<div class="empty" style="padding:10px;">None</div>';

  const parents = await countTeamParents(teamId);
  if (parents > 0) {
    parentsCountEl.textContent = `${parents} parent${parents === 1 ? '' : 's'} also following`;
    parentsCountEl.hidden = false;
  } else {
    parentsCountEl.hidden = true;
  }
}

// COACH TOOLS
function showCoachToolsIfCoach(memberships) {
  if (memberships[teamId] === 'coach' || currentUser.role === 'admin') {
    const el = document.querySelector('[data-testid="coach-tools"]');
    el.style.display = '';
    document.querySelector('[data-testid="coach-link"]').href = `coach.html?id=${encodeURIComponent(teamId)}${amp}`;
  }
}

// SIGN OUT
document.querySelector('[data-testid="signout"]').addEventListener('click', async () => {
  await signOut();
  window.location.href = 'signin.html' + qs;
});

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>

</body>
</html>
