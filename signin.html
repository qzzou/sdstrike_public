<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SDStrike Basketball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; color: #222; background: #fff; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 2px 16px 6px; background: #fff; border-bottom: 3px solid #1a3f7a; }
  nav .logo img { height: 40px; }
  nav .back-link { color: #1a3f7a; text-decoration: none; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; }

  .signin-wrap { padding: 40px 24px 48px; }
  .signin-wrap h1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .signin-wrap .subtitle { color: #888; font-size: 0.9rem; line-height: 1.5; margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 8px; }
  .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 4px; font-size: 1rem; font-family: inherit; color: #222; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-group input:focus { border-color: #1a3f7a; }
  .form-group input::placeholder { color: #bbb; }

  .forgot { display: block; text-align: right; font-size: 0.8rem; color: #888; text-decoration: none; margin-top: -12px; margin-bottom: 24px; }

  .signin-btn { width: 100%; background: #1a3f7a; color: #fff; border: none; padding: 16px; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .signin-btn:active { background: #142f5c; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; color: #ccc; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e8e8e8; }

  .social-btn { width: 100%; background: #fff; border: 2px solid #e0e0e0; border-radius: 4px; padding: 14px 16px; font-size: 0.9rem; font-weight: 600; font-family: inherit; color: #222; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; transition: border-color 0.2s, background 0.2s; }
  .social-btn:hover { border-color: #bbb; background: #fafafa; }

  .signup-prompt { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid #f0f0f0; font-size: 0.85rem; color: #888; }
  .signup-prompt a { color: #1a3f7a; font-weight: 700; text-decoration: none; }

  .auth-error { color: #c0392b; font-size: 0.85rem; margin-top: 12px; text-align: center; }
</style>
</head>
<body>

<nav>
  <a href="index.html">
    <img src="sdstrikelogo.svg" alt="SD Strike" style="height:40px; display:block;">
  </a>
  <a href="index.html" class="back-link">← Back</a>
</nav>

<div class="signin-wrap">
  <h1 data-testid="heading">Sign In</h1>
  <p class="subtitle" data-testid="subtitle">Access your team schedule and payment info.</p>

  <form id="signinForm" data-testid="signin-form">
    <div class="form-group" id="nameGroup" data-testid="name-group" style="display:none;">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" data-testid="fullname" placeholder="Your name" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" data-testid="email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" data-testid="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <a href="#" class="forgot" id="forgotLink">Forgot password?</a>
    <button type="submit" class="signin-btn" id="submitBtn" data-testid="submit">Sign In</button>
    <p class="auth-error" data-testid="auth-error" hidden></p>
  </form>

  <div class="divider">or</div>

  <button class="social-btn" id="googleBtn" data-testid="google-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="signup-prompt" id="signupPrompt" data-testid="signup-prompt">
    Don't have an account? <a href="#" id="toggleLink" data-testid="toggle-link">Sign up</a>
  </div>
</div>

<script type="module">
import {
  onAuthReady, signInWithGoogle, signInWithEmail, signUpWithEmail,
} from './shared.js';

// Preserve ?testmode=1 across navigations.
const TESTMODE = new URLSearchParams(location.search).get('testmode') === '1';
const qs = TESTMODE ? '?testmode=1' : '';

const headingEl = document.querySelector('[data-testid="heading"]');
const subtitleEl = document.querySelector('[data-testid="subtitle"]');
const submitEl = document.querySelector('[data-testid="submit"]');
const nameGroup = document.querySelector('[data-testid="name-group"]');
const forgotLink = document.getElementById('forgotLink');
const signupPrompt = document.querySelector('[data-testid="signup-prompt"]');
const errEl = document.querySelector('[data-testid="auth-error"]');

let isSignUp = false;
let signingIn = false; // true while a sign-in is in progress, prevents onAuthReady race

// If already signed in, redirect to the routing hub.
onAuthReady((user) => {
  if (signingIn) return; // let the sign-in handler do the redirect after doc is written
  if (user) {
    window.location.href = 'dashboard.html' + qs;
    return;
  }
  document.body.dataset.ready = '1';
});

function setMode(signUp) {
  isSignUp = signUp;
  headingEl.textContent = isSignUp ? 'Sign Up' : 'Sign In';
  subtitleEl.textContent = isSignUp
    ? 'Create your SDStrike account.'
    : 'Access your team schedule and payment info.';
  submitEl.textContent = isSignUp ? 'Create Account' : 'Sign In';
  nameGroup.style.display = isSignUp ? 'block' : 'none';
  forgotLink.style.display = isSignUp ? 'none' : 'block';
  signupPrompt.innerHTML = isSignUp
    ? 'Already have an account? <a href="#" id="toggleLink" data-testid="toggle-link">Sign in</a>'
    : 'Don\'t have an account? <a href="#" id="toggleLink" data-testid="toggle-link">Sign up</a>';
  document.getElementById('toggleLink').addEventListener('click', onToggleClick);
  clearErr();
}

function onToggleClick(e) {
  e.preventDefault();
  setMode(!isSignUp);
}
document.getElementById('toggleLink').addEventListener('click', onToggleClick);

document.getElementById('signinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErr();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  signingIn = true;
  try {
    if (isSignUp) {
      const name = document.getElementById('fullname').value.trim();
      await signUpWithEmail(email, password, name);
    } else {
      await signInWithEmail(email, password);
    }
    window.location.href = 'dashboard.html' + qs;
  } catch (err) {
    signingIn = false;
    showErr(friendlyError(err?.code || err?.message));
  }
});

document.getElementById('googleBtn').addEventListener('click', async () => {
  clearErr();
  signingIn = true;
  try {
    await signInWithGoogle();
    window.location.href = 'dashboard.html' + qs;
  } catch (err) {
    signingIn = false;
    if (err?.code !== 'auth/popup-closed-by-user') showErr(friendlyError(err?.code || err?.message));
  }
});

function clearErr() { errEl.hidden = true; errEl.textContent = ''; }
function showErr(msg) { errEl.textContent = msg; errEl.hidden = false; }

function friendlyError(code) {
  const map = {
    'auth/user-not-found':   'No account found with that email.',
    'auth/wrong-password':   'Incorrect password. Try again.',
    'auth/invalid-email':    'Please enter a valid email address.',
    'auth/too-many-requests':'Too many attempts. Try again later.',
    'auth/invalid-credential':   'Incorrect email or password.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>

</body>
</html>
