<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — SDStrike Basketball</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #222; background: #f8f8f8; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 2px 16px 6px; background: #fff; border-bottom: 3px solid #1a3f7a; position: sticky; top: 0; z-index: 100; }
  nav .logo img { height: 40px; display: block; }
  .signout-btn { background: none; border: none; color: #1a3f7a; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-family: inherit; }

  .dashboard-wrap { padding: 28px 16px 48px; }
  .welcome { background: #1a3f7a; color: #fff; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .welcome .label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #5a9cf5; margin-bottom: 4px; }
  .welcome h2 { font-size: 1.3rem; font-weight: 900; }
  .welcome .team { font-size: 0.85rem; color: #aac4f5; margin-top: 4px; }
  .welcome .role-badge { display: inline-block; margin-top: 10px; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: rgba(255,255,255,0.15); color: #fff; }

  .pending-box { border: 2px solid #f0b429; border-radius: 8px; padding: 20px; text-align: center; background: #fffbf0; margin-bottom: 16px; }
  .pending-box .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
  .pending-box h3 { font-size: 1rem; font-weight: 800; color: #b7860a; margin-bottom: 6px; }
  .pending-box p { font-size: 0.85rem; color: #888; line-height: 1.5; }

  .section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .section h3 { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 16px; }

  .coming-soon { text-align: center; padding: 24px 0 8px; color: #bbb; font-size: 0.9rem; }
  .coming-soon .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<nav>
  <a href="index.html">
    <img src="sdstrikelogo.svg" alt="SD Strike" style="height:40px;">
  </a>
  <button class="signout-btn" id="signOutBtn">Sign Out</button>
</nav>

<div class="dashboard-wrap">

  <div class="welcome">
    <div class="label">Welcome back</div>
    <h2 id="userName">Loading...</h2>
    <div class="team" id="teamName"></div>
    <span class="role-badge" id="roleBadge" style="display:none;"></span>
  </div>

  <div class="pending-box" id="pendingBox" style="display:none;">
    <span class="icon">&#9203;</span>
    <h3>Awaiting Approval</h3>
    <p>Your account is pending review. The admin will approve your request shortly. Check back soon!</p>
  </div>

  <div class="section">
    <h3>Practice &amp; Game Schedule</h3>
    <div class="coming-soon">
      <span class="icon">&#128197;</span>
      Schedule coming soon
    </div>
  </div>

  <div class="section">
    <h3>Payment Notices</h3>
    <div class="coming-soon">
      <span class="icon">&#128179;</span>
      Payment info coming soon
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';

  // ── PASTE YOUR SAME FIREBASE CONFIG HERE ─────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBvbspciyWNFHljZPvKTvW47Z0dfQwSrzM",
    authDomain: "sdstrike-4f344.firebaseapp.com",
    projectId: "sdstrike-4f344",
    storageBucket: "sdstrike-4f344.firebasestorage.app",
    messagingSenderId: "828937445096",
    appId: "1:828937445096:web:1041315fe97bde3744735d"
  };
  // ─────────────────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Redirect to sign-in if not logged in, otherwise load dashboard
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'signin.html';
      return;
    }

    // Fill name from Auth
    document.getElementById('userName').textContent = user.displayName || user.email;

    // Read user role from Firestore
    const userSnap = await getDoc(doc(db, 'users', user.uid));
    const userData = userSnap.exists() ? userSnap.data() : null;
    const role = userData?.role || 'pending';

    // Show role badge
    const roleLabels = { admin: 'Admin', coach: 'Coach', player: 'Player', pending: 'Pending' };
    const badge = document.getElementById('roleBadge');
    badge.textContent = roleLabels[role] || role;
    badge.style.display = 'inline-block';

    // Show team name if assigned
    if (userData?.teamId) {
      const teamSnap = await getDoc(doc(db, 'teams', userData.teamId));
      if (teamSnap.exists()) {
        document.getElementById('teamName').textContent = teamSnap.data().name;
      }
    } else if (role === 'pending' && userData?.requestedRole) {
      document.getElementById('teamName').textContent = `Requested: ${userData.requestedRole}`;
    }

    // Show pending notice
    if (role === 'pending') {
      document.getElementById('pendingBox').style.display = 'block';
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'signin.html';
  });
</script>

</body>
</html>
